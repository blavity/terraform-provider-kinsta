# Release Workflow
#
# To cut a release: push a semver tag from main, e.g.
#   git tag v0.3.0 && git push origin v0.3.0
#
# That tag triggers this workflow, which builds multi-platform provider
# binaries, signs the SHA256SUMS checksum file with the GPG key stored in
# repo secrets, generates a conventional-commit-grouped changelog into the
# GitHub Release body, and uploads the artifacts. The release-please
# automation was removed in favor of this manual-tag flow — it matches the
# HashiCorp scaffolding-framework canonical pattern and the rest of the
# Terraform provider ecosystem (terraform-provider-aws, -google, etc.).
#
# See KEYS.md for the one-time maintainer setup (generate keypair, register
# public.asc with the Terraform Registry, store private.asc + passphrase
# as repo secrets).
#
# Failure recovery: if goreleaser fails partway, delete the partial release
# (and tag if needed) and re-run:
#   gh release delete vX.Y.Z --repo blavity/terraform-provider-kinsta --yes --cleanup-tag
#   git tag vX.Y.Z <sha> && git push origin vX.Y.Z
# Or use the workflow_dispatch trigger below to re-run against an existing
# tag (after cleaning up any partial release).

name: Release

on:
  push:
    tags:
      # Match every semver tag, including prereleases like `v0.0.1-rc.1`.
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd # v7.0.0
        id: import_gpg
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.PASSPHRASE }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@1a80836c5c9d9e5755a25cb59ec6f45a3b5f41a8 # v7.2.1
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}
