# Release Workflow
#
# Triggered by semver tags pushed by release-please (e.g., v0.1.0). Builds
# multi-platform provider binaries, signs the SHA256SUMS checksum file with
# the GPG key stored in repo secrets, and appends the artifacts to the
# GitHub Release that release-please already created.
#
# This is the canonical pattern from
# hashicorp/terraform-provider-scaffolding-framework. See KEYS.md for the
# one-time maintainer setup (generate keypair, register public.asc with the
# Terraform Registry, store private.asc + passphrase as repo secrets).
#
# Failure recovery: if signing fails after release-please created the GH
# Release, the Release exists without artifacts. Recovery:
#   gh release delete vX.Y.Z --repo blavity/terraform-provider-kinsta --yes
#   gh workflow run release.yml --repo blavity/terraform-provider-kinsta \
#     --ref vX.Y.Z
# (the workflow_dispatch trigger below makes the re-run possible.)

name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd # v7.0.0
        id: import_gpg
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.PASSPHRASE }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7.0.0
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}
