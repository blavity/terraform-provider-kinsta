# Release Please Workflow
#
# Purpose
# Automates versioning, changelog generation, and GitHub releases for
# terraform-provider-kinsta using conventional commits.
#
# How it works:
#   1. On push to main -> creates/updates a release PR with changelog + version bump
#   2. On release PR merge -> creates GitHub Release + git tag (e.g., v0.1.0)
#   3. The tag triggers release.yml which builds + signs provider binaries via
#      Cloud KMS (libkmsp11 + gnupg-pkcs11-scd) and appends them to the
#      release-please-created GitHub Release. See KEYS.md sec 4a.
#
# Note: release-please-action's skip-github-release option is NOT used here
# because it also skips tag creation, which would prevent release.yml from
# firing. See googleapis/release-please-action README on splitting tagging
# from PRs.
#
# Conventional commits drive changelog generation:
#   feat(provider): add wordpress domain resource   -> Features
#   fix(client): handle rate limit errors           -> Bug Fixes
#   chore: update dependencies                      -> Miscellaneous

name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Run Release Please
        uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
