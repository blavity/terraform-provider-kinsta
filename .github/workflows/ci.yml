name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - name: Vet
        run: go vet ./...
      - name: Build
        run: go build ./...
      - name: Unit tests with coverage
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./internal/...
      - name: Upload coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 1

  # Coverage ratchet: vladopajic/go-test-coverage fetches main's coverage as a
  # baseline and fails the PR if any package or the total drops. No committed
  # threshold file needed — the action tracks the baseline automatically.
  # Pure Go-native; no external service (Codecov/Coveralls) involved.
  coverage:
    name: Coverage (ratchet vs main)
    needs: test
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - name: Download coverage artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage-report
      - name: Check coverage and post PR comment
        uses: vladopajic/go-test-coverage@a93b868a4cbcbf18dc3781650fad241f0020e609 # v2.18.8
        with:
          profile: coverage.out
          git-token: ${{ secrets.GITHUB_TOKEN }}
          git-branch: main

  docs:
    name: Verify docs are in sync with schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      # Pin to a specific tfplugindocs release so CI output is reproducible
      # and upstream changes are reviewed intentionally. Bump alongside the
      # `Development` section in README.md.
      - name: Install tfplugindocs
        run: go install github.com/hashicorp/terraform-plugin-docs/cmd/tfplugindocs@v0.25.0
      - name: Generate docs
        run: tfplugindocs generate --provider-name kinsta
      - name: Fail on diff or untracked files
        run: |
          if ! git diff --exit-code docs/; then
            echo "::error::docs/ is out of sync with the provider schema."
            echo "::error::Run 'tfplugindocs generate --provider-name kinsta' locally and commit the result."
            exit 1
          fi
          # `git diff` only inspects tracked files. A new resource without a
          # committed docs/resources/*.md would otherwise slip through.
          untracked=$(git ls-files --others --exclude-standard docs/)
          if [ -n "$untracked" ]; then
            echo "::error::tfplugindocs produced new files under docs/ that are not committed:"
            echo "$untracked"
            echo "::error::Run 'tfplugindocs generate --provider-name kinsta' locally and commit the generated files."
            exit 1
          fi
