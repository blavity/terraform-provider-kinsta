name: CI

on:
  push:
    branches:
      - main
  pull_request:
    # Default trigger types (opened, synchronize, reopened) plus `labeled`
    # so adding the `acceptance-test` label kicks off the gated acceptance
    # job. Intentionally excludes `edited` and `unlabeled` — those would
    # rerun the full pipeline on PR description tweaks and label removals
    # for no useful coverage gain.
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - name: Vet
        run: go vet ./...
      - name: Build
        run: go build ./...
      - name: Unit tests with coverage
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./internal/...
      - name: Upload coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 1

  # Coverage floor: enforces a fixed minimum on total coverage. Pure
  # Go-native; no external service (Codecov/Coveralls) involved.
  #
  # Threshold is a fixed floor (80%, current actual is ~93%). True
  # "ratchet vs main" — never-go-backwards comparison — requires a separate
  # workflow to publish main's breakdown.json and cross-workflow artifact
  # sharing; tracked as #71.
  #
  # No git-token / git-branch: the action's PR-comment + badge feature
  # writes back to the repo on a configurable branch and requires
  # contents: write, which is unsafe to grant on pull_request runs from
  # forks. Dropping both inputs keeps the threshold gate without the
  # comment; #71 will reintroduce reporting via a safer split workflow.
  coverage:
    name: Coverage (floor)
    needs: test
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - name: Download coverage artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage-report
      - name: Check coverage threshold
        uses: vladopajic/go-test-coverage@a93b868a4cbcbf18dc3781650fad241f0020e609 # v2.18.8
        with:
          profile: coverage.out
          threshold-total: 80

  docs:
    name: Verify docs are in sync with schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      # Pin to a specific tfplugindocs release so CI output is reproducible
      # and upstream changes are reviewed intentionally. Bump alongside the
      # `Development` section in README.md.
      - name: Install tfplugindocs
        run: go install github.com/hashicorp/terraform-plugin-docs/cmd/tfplugindocs@v0.25.0
      - name: Generate docs
        run: tfplugindocs generate --provider-name kinsta
      - name: Fail on diff or untracked files
        run: |
          if ! git diff --exit-code docs/; then
            echo "::error::docs/ is out of sync with the provider schema."
            echo "::error::Run 'tfplugindocs generate --provider-name kinsta' locally and commit the result."
            exit 1
          fi
          # `git diff` only inspects tracked files. A new resource without a
          # committed docs/resources/*.md would otherwise slip through.
          untracked=$(git ls-files --others --exclude-standard docs/)
          if [ -n "$untracked" ]; then
            echo "::error::tfplugindocs produced new files under docs/ that are not committed:"
            echo "$untracked"
            echo "::error::Run 'tfplugindocs generate --provider-name kinsta' locally and commit the generated files."
            exit 1
          fi

  # Acceptance tests against a real Kinsta company. Gated on:
  #   - workflow_dispatch (manual), OR
  #   - pull_request with the `acceptance-test` label
  # The `kinsta-test` GitHub Environment supplies KINSTA_API_KEY and
  # KINSTA_COMPANY_ID as environment-scoped secrets and requires manual
  # approval before the job starts (configured in repo Settings →
  # Environments). Fork PRs can't read environment secrets even with the
  # label, so this is safe to enable on `pull_request` rather than
  # `pull_request_target`.
  #
  # Matrix: one leg per Terraform-protocol CLI. TF_ACC_TERRAFORM_PATH
  # selects which binary the SDK invokes during acceptance runs.
  #
  # Requires #79 — kinsta-test environment + secrets — to be provisioned
  # before this job will produce useful results. Until then the job will
  # request approval and then fail at testAccPreCheck on missing creds.
  acceptance:
    name: Acceptance (${{ matrix.cli }})
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'acceptance-test'))
    needs: test
    runs-on: ubuntu-latest
    environment: kinsta-test
    strategy:
      fail-fast: false
      matrix:
        cli: [terraform, opentofu]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Install Terraform CLI
        if: matrix.cli == 'terraform'
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_wrapper: false
      - name: Install OpenTofu CLI
        if: matrix.cli == 'opentofu'
        uses: opentofu/setup-opentofu@847eaa4afeb791b06daa46e8eafa8b1b68d7cfb4 # v2.0.1
        with:
          tofu_wrapper: false

      - name: Point TF_ACC_TERRAFORM_PATH at the selected CLI
        run: |
          if [ "${{ matrix.cli }}" = "terraform" ]; then
            echo "TF_ACC_TERRAFORM_PATH=$(command -v terraform)" >> "$GITHUB_ENV"
          else
            echo "TF_ACC_TERRAFORM_PATH=$(command -v tofu)" >> "$GITHUB_ENV"
          fi

      - name: Run acceptance tests
        env:
          TF_ACC: "1"
          KINSTA_API_KEY: ${{ secrets.KINSTA_API_KEY }}
          KINSTA_COMPANY_ID: ${{ secrets.KINSTA_COMPANY_ID }}
        run: go test -race -timeout 30m ./internal/provider/...

      # Best-effort: reap any resources the suite leaked. The sweeper from
      # #65 / #75 looks for display names starting with `tf-acc-test`.
      # Runs even if the test step failed so a flaky test doesn't strand
      # billable orphans.
      - name: Sweep test-account orphans
        if: always()
        env:
          KINSTA_API_KEY: ${{ secrets.KINSTA_API_KEY }}
          KINSTA_COMPANY_ID: ${{ secrets.KINSTA_COMPANY_ID }}
        run: go test -v ./internal/provider/... -sweep=global
