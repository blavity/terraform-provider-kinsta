name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - name: Vet
        run: go vet ./...
      - name: Build
        run: go build ./...
      - name: Unit tests
        run: go test -race ./internal/...

  docs:
    name: Verify docs are in sync with schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - name: Install tfplugindocs
        run: go install github.com/hashicorp/terraform-plugin-docs/cmd/tfplugindocs@latest
      - name: Generate docs
        run: tfplugindocs generate --provider-name kinsta
      - name: Fail on diff
        run: |
          if ! git diff --exit-code docs/; then
            echo "::error::docs/ is out of sync with the provider schema."
            echo "::error::Run 'tfplugindocs generate --provider-name kinsta' locally and commit the result."
            exit 1
          fi
