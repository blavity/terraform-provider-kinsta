version: 2

# Dependency updates for this public repo. Kept GitHub-native so the config is
# self-contained and visible to outside contributors (private Renovate presets
# live elsewhere — do not reintroduce them here).
#
# Auto-merge for patch updates and security fixes is handled by
# .github/workflows/dependabot-automerge.yml.

updates:
  # Go modules — grouped into a single PR per cycle to reduce noise.
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - go
    commit-message:
      prefix: "chore(deps)"
    groups:
      go-modules:
        patterns:
          - "*"

  # GitHub Actions — grouped; Dependabot preserves SHA pins per constitution
  # Principle VII and bumps them to the new commit SHA on each release.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: "chore(ci)"
    groups:
      github-actions:
        patterns:
          - "*"
