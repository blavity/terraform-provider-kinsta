project_name: terraform-provider-kinsta

before:
  hooks:
    - go mod tidy

builds:
  - main: .
    binary: terraform-provider-kinsta
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
    flags:
      - -trimpath

archives:
  - format: zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_SHA256SUMS"

signs:
  # Signing key is provided by Cloud KMS via libkmsp11 + gnupg-pkcs11-scd
  # (see .github/workflows/release.yml and KEYS.md §4a). The default-key is
  # written into ~/.gnupg/gpg.conf at workflow runtime, so no passphrase or
  # explicit key id is needed here. `--no-tty --batch` is sufficient for
  # headless signing against the KMS-backed key.
  - cmd: gpg
    signature: "${artifact}.sig"
    artifacts: checksum
    args:
      - "--no-tty"
      - "--batch"
      - "--detach-sign"
      - "--output"
      - "${signature}"
      - "${artifact}"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

release:
  # release-please creates the GitHub Release with changelog notes when the
  # release PR is merged; goreleaser appends the signed artifacts here.
  # If signing fails, the release-please-created release exists without
  # artifacts — recovery is `gh release delete vX.Y.Z` then `gh workflow run
  # release.yml --ref vX.Y.Z`. See KEYS.md sec 4a "Release recovery".
  mode: append
  github:
    owner: blavity
    name: terraform-provider-kinsta
