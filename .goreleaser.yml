project_name: terraform-provider-kinsta

before:
  hooks:
    - go mod tidy

builds:
  - main: .
    binary: terraform-provider-kinsta
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
    flags:
      - -trimpath

archives:
  - format: zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_SHA256SUMS"

signs:
  # GPG_FINGERPRINT is exported by `crazy-max/ghaction-import-gpg` in
  # .github/workflows/release.yml and picks the right key out of the keyring.
  # See KEYS.md for the one-time maintainer setup.
  - artifacts: checksum
    args:
      - "--batch"
      - "--local-user"
      - "{{ .Env.GPG_FINGERPRINT }}"
      - "--output"
      - "${signature}"
      - "--detach-sign"
      - "${artifact}"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

release:
  # release-please creates the GitHub Release with changelog notes when the
  # release PR is merged; goreleaser appends the signed artifacts here. If
  # signing fails, the release-please-created release exists without
  # artifacts — see release.yml header for the gh-release-delete + workflow_dispatch
  # recovery sequence.
  mode: append
  github:
    owner: blavity
    name: terraform-provider-kinsta
