project_name: terraform-provider-kinsta

before:
  hooks:
    - go mod tidy

builds:
  - main: .
    binary: terraform-provider-kinsta
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
    flags:
      - -trimpath

archives:
  - format: zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_SHA256SUMS"

signs:
  - cmd: gpg
    signature: "${artifact}.sig"
    artifacts: checksum
    args:
      - "--batch"
      - "--pinentry-mode"
      - "loopback"
      - "--passphrase"
      - "{{ .Env.GPG_PASSPHRASE }}"
      - "--output"
      - "${signature}"
      - "--detach-sign"
      - "${artifact}"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

release:
  # release-please creates the GitHub Release with changelog notes;
  # goreleaser appends the built artifacts without overwriting them.
  mode: append
  github:
    owner: blavity
    name: terraform-provider-kinsta
