project_name: terraform-provider-kinsta

before:
  hooks:
    - go mod tidy

builds:
  - main: .
    binary: terraform-provider-kinsta
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
    flags:
      - -trimpath

archives:
  - format: zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_SHA256SUMS"

signs:
  # GPG_FINGERPRINT is exported by `crazy-max/ghaction-import-gpg` in
  # .github/workflows/release.yml and picks the right key out of the keyring.
  # See KEYS.md for the one-time maintainer setup.
  - artifacts: checksum
    args:
      - "--batch"
      - "--local-user"
      - "{{ .Env.GPG_FINGERPRINT }}"
      - "--output"
      - "${signature}"
      - "--detach-sign"
      - "${artifact}"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

# Group commits by conventional-commit type for the GitHub Release body.
# Replaces the CHANGELOG.md previously maintained by release-please — the
# release notes themselves serve that purpose now (Terraform Registry reads
# the release body, not a CHANGELOG file).
changelog:
  use: github
  sort: asc
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Bug Fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Documentation
      regexp: '^.*?docs(\(.+\))??!?:.+$'
      order: 2
    - title: Miscellaneous
      order: 99
  filters:
    exclude:
      - '^chore\(release\):'
      - '^Merge pull request'
      - '^Merge branch'

release:
  # Terraform Registry requires the manifest renamed with the version prefix.
  # https://developer.hashicorp.com/terraform/registry/providers/publishing#manifest-file
  extra_files:
    - glob: terraform-registry-manifest.json
      name_template: "{{ .ProjectName }}_{{ .Version }}_manifest.json"
  github:
    owner: blavity
    name: terraform-provider-kinsta
