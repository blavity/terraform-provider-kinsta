project_name: terraform-provider-kinsta

before:
  hooks:
    - go mod tidy

builds:
  - main: .
    binary: terraform-provider-kinsta
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
    flags:
      - -trimpath

archives:
  - format: zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_SHA256SUMS"

signs:
  # Signing key is provided by Cloud KMS via libkmsp11 + gnupg-pkcs11-scd
  # (see .github/workflows/release.yml and KEYS.md §4a). The default-key is
  # written into ~/.gnupg/gpg.conf at workflow runtime, so no passphrase or
  # explicit key id is needed here. `--no-tty --batch` is sufficient for
  # headless signing against the KMS-backed key.
  - cmd: gpg
    signature: "${artifact}.sig"
    artifacts: checksum
    args:
      - "--no-tty"
      - "--batch"
      - "--detach-sign"
      - "--output"
      - "${signature}"
      - "${artifact}"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

release:
  # release-please runs with `skip-github-release: true`, so the GitHub
  # Release does NOT exist at this point — GoReleaser creates it here, after
  # signing succeeds, so a signing failure can never leave an orphan Release.
  # Release notes are passed via `--release-notes` from the workflow (extracted
  # from CHANGELOG.md by the tag-triggered job).
  github:
    owner: blavity
    name: terraform-provider-kinsta
